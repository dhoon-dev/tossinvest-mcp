[mcp_servers.tossinvest]
# Static bearer-token deployments are read-only when live order tools require
# OAuth scopes. Use an OAuth-capable client for scoped live order access.
url = "https://your-domain.example/mcp"
bearer_token_env_var = "TOSSINVEST_MCP_BEARER_TOKEN"
startup_timeout_sec = 30
tool_timeout_sec = 60
default_tools_approval_mode = "prompt"
