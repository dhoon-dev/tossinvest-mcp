[mcp_servers.tossinvest]
# This local STDIO example is read-only by default. To allow live orders for a
# trusted personal Codex process, add "--enable-live-orders" and
# "--allow-stdio-live-orders" to args. Keep "--require-live-order-confirmation"
# enabled so only confirm_live_order sends the final TossInvest request.
command = "uvx"
args = [
  "--from",
  "git+https://github.com/dhoon-dev/tossinvest-mcp-remote.git@main",
  "tossinvest-mcp-remote",
  "stdio",
  "--client-id-command",
  "/usr/bin/security find-generic-password -s tossinvest-api-key -w",
  "--client-secret-command",
  "/usr/bin/security find-generic-password -s tossinvest-secret-key -w",
  "--account",
  "12345678901",
  # "--enable-live-orders",
  # "--allow-stdio-live-orders",
  # "--require-live-order-confirmation",
]
startup_timeout_sec = 30
tool_timeout_sec = 60
default_tools_approval_mode = "approve"

[mcp_servers.tossinvest.tools.confirm_live_order]
approval_mode = "prompt"
