name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.0.0."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft."
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: release

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --all-extras --group docs

      - name: Validate release tag
        run: uv run --locked python scripts/validate_release_tag.py "$TAG"
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Lint
        run: uv run --locked ruff check .

      - name: Type check
        run: uv run --locked ty check

      - name: Run unit tests
        run: uv run --locked pytest -m "not live"

      - name: Build documentation
        run: |
          uv run --locked --group docs sphinx-build -W -b html docs docs/_build/html
          touch docs/_build/html/.nojekyll

      - name: Build package
        run: uv build

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == false && inputs.prerelease == false }}
        uses: actions/configure-pages@v6

      - name: Upload latest documentation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == false && inputs.prerelease == false }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

      - name: Archive documentation
        run: |
          version="$TAG"
          version="${version#v}"
          tar -czf "dist/tossinvest-mcp-remote-${version}-docs-html.tar.gz" -C docs/_build/html .
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          DRAFT: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          args=(
            release create "$TAG"
            dist/*
            --repo "${{ github.repository }}"
            --verify-tag
            --generate-notes
            --title "$TAG"
          )

          if [[ "$DRAFT" == "true" ]]; then
            args+=(--draft)
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

  deploy-docs:
    name: Deploy latest documentation
    runs-on: ubuntu-latest
    needs: release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == false && inputs.prerelease == false }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
